{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="glass-card p-4 p-lg-5 rounded-4 shadow-lg">
            <div class="text-center mb-4">
                <span class="display-1 d-block">📸</span>
                <h2 class="fw-bold mt-2">Analyse patient</h2>
                <p class="text-muted">Téléchargez une image de lésion pour un diagnostic IA</p>
            </div>
            <form method="POST" enctype="multipart/form-data" id="predictForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom complet</label>
                    <input class="form-control form-control-lg rounded-3" type="text" name="name" placeholder="ex: Marie Dupont" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Âge</label>
                    <input class="form-control form-control-lg rounded-3" type="number" name="age" placeholder="Âge du patient" required min="1" max="120">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Image de la lésion</label>
                    <div class="file-upload-area rounded-3" id="fileUploadArea">
                        <input type="file" name="image" id="lesionImage" accept="image/*" required style="display: none;">
                        <div class="upload-placeholder text-center p-3">
                            <span class="upload-icon">📤</span> Cliquez ou glissez une image (max 6 Mo)
                        </div>
                    </div>
                    <img id="imagePreview" class="mt-3 rounded-4 shadow-sm" style="display: none; max-width: 100%; max-height: 220px; object-fit: cover;">
                </div>
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill flex-fill">🔬 Analyser</button>
                    <a href="/dashboard" class="btn btn-outline-secondary btn-lg rounded-pill flex-fill">Annuler</a>
                </div>
            </form>
            {% if demo_mode %}
            <div class="alert alert-info mt-4 rounded-3 small">ℹ️ Mode démo : résultats simulés à des fins d'illustration.</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
