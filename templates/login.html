{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5">
        <div class="glass-card p-5 shadow-lg rounded-4">
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">🔐</div>
                <h2 class="fw-bold">Connexion</h2>
                <p class="text-muted">Accédez à votre espace DermAI</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-medium">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control form-control-lg rounded-3" placeholder="ex: admin" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Mot de passe</label>
                    <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold">Se connecter →</button>
            </form>
            <div class="text-center mt-4 small">
                Pas encore de compte ? <a href="/register" class="text-decoration-none fw-semibold">Inscrivez-vous</a>
            </div>
            <div class="text-center mt-3 text-muted small border-top pt-3">
                🔑 identifiants de démonstration : <strong class="fw-semibold">admin / 1234</strong>
            </div>
        </div>
    </div>
</div>
{% endblock %}
